name: Build Release ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version in plugin file
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^ \* Version: .*/ * Version: ${VERSION}/" woo-ecf-dgii.php
          sed -i "s/define('WOO_ECF_DGII_VERSION', '.*')/define('WOO_ECF_DGII_VERSION', '${VERSION}')/" woo-ecf-dgii.php

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Build ZIP
        run: |
          SLUG="ecf-dgii-invoicing"
          VERSION="${GITHUB_REF_NAME#v}"

          # Create build directory with plugin slug as top folder
          mkdir -p "/tmp/${SLUG}"

          # Copy plugin files (exclude dev/CI files)
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.stubs.php' \
            --exclude='dev/' \
            --exclude='tests/' \
            --exclude='docs/' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='phpunit.xml' \
            --exclude='phpunit.xml.dist' \
            --exclude='*.md' \
            --exclude='node_modules/' \
            ./ "/tmp/${SLUG}/"

          # Create ZIP
          cd /tmp
          zip -r "${GITHUB_WORKSPACE}/${SLUG}-${VERSION}.zip" "${SLUG}/"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG="ecf-dgii-invoicing"
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "${GITHUB_REF_NAME}" "${SLUG}-${VERSION}.zip" --clobber
