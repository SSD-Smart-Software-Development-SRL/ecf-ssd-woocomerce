name: Build Release ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog.txt
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Find the previous release tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | grep -v "${GITHUB_REF_NAME}" | head -1)

          echo "*** ECF DGII Invoicing for WooCommerce Changelog ***" > changelog.txt
          echo "" >> changelog.txt
          echo "= ${VERSION} =" >> changelog.txt

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="${GITHUB_REF_NAME}"
          fi

          # Extract conventional commit messages, format as changelog entries
          git log "${RANGE}" --pretty=format:"%s" --no-merges | while IFS= read -r msg; do
            # Skip chore/ci/docs/test/style commits
            if echo "$msg" | grep -qE '^(chore|ci|docs|test|style)(\(.*\))?:'; then
              continue
            fi

            # Format feat/fix/perf/refactor commits
            if echo "$msg" | grep -qE '^(feat|fix|perf|refactor)(\(.*\))?!?:'; then
              # Strip the conventional commit prefix
              description=$(echo "$msg" | sed -E 's/^(feat|fix|perf|refactor)(\(.*\))?!?:\s*//')
              echo "* ${description}" >> changelog.txt
            fi
          done

          # If no conventional commits found, list all non-merge commits
          if ! grep -q '^\*' changelog.txt; then
            git log "${RANGE}" --pretty=format:"* %s" --no-merges >> changelog.txt
          fi

          echo "" >> changelog.txt
          cat changelog.txt

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Build ZIP
        run: |
          SLUG="ecf-dgii-invoicing"
          VERSION="${GITHUB_REF_NAME#v}"

          # Create build directory with plugin slug as top folder
          mkdir -p "/tmp/${SLUG}"

          # Copy plugin files (exclude dev/CI files)
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.stubs.php' \
            --exclude='.release-please*' \
            --exclude='commitlint.config.js' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='dev/' \
            --exclude='tests/' \
            --exclude='docs/' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='phpunit.xml' \
            --exclude='phpunit.xml.dist' \
            --exclude='*.md' \
            --exclude='node_modules/' \
            ./ "/tmp/${SLUG}/"

          # Create ZIP
          cd /tmp
          zip -r "${GITHUB_WORKSPACE}/${SLUG}-${VERSION}.zip" "${SLUG}/"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG="ecf-dgii-invoicing"
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "${GITHUB_REF_NAME}" "${SLUG}-${VERSION}.zip" --clobber
