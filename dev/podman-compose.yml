version: "3.8"

services:
  db:
    image: docker.io/library/mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: wordpress
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3

  wordpress:
    image: docker.io/library/wordpress:6.4-php8.2
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
    volumes:
      - wp_data:/var/www/html
      - ../:/var/www/html/wp-content/plugins/woo-ecf-dgii
      - ../../ecf_dgii_clients/php:/opt/ecf-dgii-php
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c", "/var/www/html/wp-content/plugins/woo-ecf-dgii/dev/setup.sh & docker-entrypoint.sh apache2-foreground"]

volumes:
  db_data:
  wp_data:
